services:
  bot:
    build:
      context: .
    environment:
      NODE_ENV: production
    volumes:
      - type: bind
        source: ./config.json
        target: /usr/src/app/config.json
        read_only: true
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.50
    pids_limit: 100
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
